services:

  neo4j:
    image: neo4j:5
    container_name: lineage-neo4j

    ports:
      - "7474:7474"
      - "7687:7687"

    environment:
      NEO4J_AUTH: neo4j/password

    volumes:
      - neo4j_data:/data

  postgres:
    image: postgres:16

    container_name: lineage-postgres

    environment:
      POSTGRES_DB: lineage
      POSTGRES_USER: lineage
      POSTGRES_PASSWORD: lineage

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  neo4j_data:
  postgres_data: